# ╔══════════════════════════════════════════════════════════════════╗
# ║                    SHINOBU STORE MESSAGES                        ║
# ║                     Author: SrCodexStudio                         ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Placeholders available:
# {player} - Player name
# {cost} - Original cost
# {total} - Total cost with fees
# {item} - Item name
# {link} - PayPal payment link
# {time} - Time remaining
# {prefix} - Plugin prefix
#
# Color codes: Use & for legacy colors or MiniMessage format

prefix: "&b&lShinobu&f&lStore &8» &r"

# ┌──────────────────────────────────────────────────────────────────┐
# │                     GENERAL MESSAGES                             │
# └──────────────────────────────────────────────────────────────────┘
general:
  reload-success: "{prefix}&aConfiguration reloaded successfully!"
  no-permission: "{prefix}&cYou don't have permission to do this."
  player-only: "{prefix}&cThis command can only be used by players."
  invalid-usage: "{prefix}&cInvalid usage. Use &f/{command} help &cfor help."
  player-not-found: "{prefix}&cPlayer not found."
  unknown-command: "{prefix}&cUnknown command. Use &f/shinobustore help &cfor help."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     STORE MESSAGES                               │
# └──────────────────────────────────────────────────────────────────┘
store:
  opening: "{prefix}&7Opening store..."
  pending-exists: "{prefix}&cYou already have a pending transaction!"
  pending-exists-hint: "{prefix}&7Use &f/cancel &7to cancel it or &f/timer &7to check expiration."
  purchase-cancelled: "{prefix}&cPurchase of {item} &ccancelled."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     PAYMENT MESSAGES                             │
# └──────────────────────────────────────────────────────────────────┘
payment:
  creating-order: "{prefix}&7Creating payment order..."
  order-created: "{prefix}&aPayment order created!"
  cost-info: "{prefix}&7Original price: &f{cost} &7| Total with fees: &f{total}"

  # Clickable buttons
  link-button: "&a&l[CHECKOUT]"
  link-hover: "&aClick to open PayPal checkout"

  cancel-button: "&c&l[CANCEL]"
  cancel-hover: "&cClick to cancel this transaction"

  timer-button: "&6&l[TIMER]"
  timer-hover: "&6Click to check time remaining"

  # Payment completed
  completed: "{prefix}&a&lPayment completed! &7Thank you for your purchase!"
  completed-item: "{prefix}&7You purchased: &b{item}"

  # Payment failed
  failed: "{prefix}&cPayment failed. Please try again or contact support."
  expired: "{prefix}&cYour payment order has expired."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     CANCEL MESSAGES                              │
# └──────────────────────────────────────────────────────────────────┘
cancel:
  success: "{prefix}&aSuccessfully cancelled your pending transaction!"
  no-pending: "{prefix}&cYou don't have any pending transactions."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     TIMER MESSAGES                               │
# └──────────────────────────────────────────────────────────────────┘
timer:
  header: "{prefix}&8&m──────────&r &b&lTransaction Timer &8&m──────────"
  footer: "{prefix}&8&m────────────────────────────────────────────"
  remaining: "{prefix}&7{item} &8- &fExpires in: &e{time}"
  expired: "{prefix}&c{item} &8- &cExpired"
  no-pending: "{prefix}&cYou don't have any pending transactions."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     LOOKUP MESSAGES                              │
# └──────────────────────────────────────────────────────────────────┘
lookup:
  header: "&8&m─────────────&r &b&lTransaction Lookup &8&m─────────────"
  footer: "&8&m──────────────────────────────────────────────────"
  usage-header: "{prefix}&8&m──────────&r &b&lLookup Usage &8&m──────────"
  player-required: "{prefix}&cPlease specify a player name."
  player-header: "{prefix}&8&m──────────&r &b&lPlayer: &f{player} &8&m──────────"
  player-not-found: "{prefix}&cPlayer &f{player} &chas never played before."
  transaction-id-required: "{prefix}&cPlease specify an order ID."
  transaction-not-found: "{prefix}&cNo transaction found with ID: &f{id}"
  no-pending: "{prefix}&cNo pending transactions found."
  no-recent: "{prefix}&cNo recent completed transactions found."

  pending:
    found: "&aPending Transaction Found:"
    player: "&8➤ &7Player: &f{player}"
    item: "&8➤ &7Item: &f{item}"
    cost: "&8➤ &7Cost: &f{cost}"
    expires: "&8➤ &7Expires: &f{time}"

  history:
    found: "&aHistorical Transaction Found:"
    player: "&8➤ &7Player: &f{player}"
    item: "&8➤ &7Item: &f{item}"
    cost: "&8➤ &7Cost: &f{cost}"
    created: "&8➤ &7Created: &f{created}"
    completed: "&8➤ &7Completed: &f{completed}"

  not-found: "{prefix}&cNo transaction found with that ID."
  invalid-type: "{prefix}&cInvalid type. Use &fpending &cor &fhistory&c."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     SIMULATE MESSAGES                            │
# └──────────────────────────────────────────────────────────────────┘
simulate:
  started: "{prefix}&aSimulating purchase of &f{item}&a..."
  completed: "{prefix}&aSimulation complete! Commands executed: &f{count}"
  item-not-found: "{prefix}&cItem not found: &f{item}&c. Use &f/ss simulate &cto list items."
  list-header: "{prefix}&7Available items to simulate:"
  list-item: "&8  - &f{id} &7({name} - {symbol}{cost})"
  not-player: "{prefix}&cOnly players can use the simulate command."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     RATE LIMIT MESSAGES                          │
# └──────────────────────────────────────────────────────────────────┘
rate-limit:
  cooldown: "{prefix}&cPlease wait &f{time} &cbefore doing this again."
  too-many-requests: "{prefix}&cToo many requests. Please slow down."
  temporarily-blocked: "{prefix}&cYou are temporarily blocked. Try again in &f{time}&c."

# ┌──────────────────────────────────────────────────────────────────┐
# │                     HELP MESSAGES                                │
# └──────────────────────────────────────────────────────────────────┘
help:
  header: "&8&m─────────────&r &b&lShinobu Store Help &8&m─────────────"
  footer: "&8&m──────────────────────────────────────────────────"
  commands:
    - "&f/store &8- &7Open the store menu"
    - "&f/cancel &8- &7Cancel your pending transaction"
    - "&f/timer &8- &7Check transaction expiration"
  admin-commands:
    - "&f/store reload &8- &7Reload configuration"
    - "&f/lookup <type> <id> &8- &7Lookup transactions"

# ┌──────────────────────────────────────────────────────────────────┐
# │                     ERROR MESSAGES                               │
# └──────────────────────────────────────────────────────────────────┘
errors:
  paypal-not-configured: "{prefix}&cPayPal is not configured. Please contact an administrator."
  paypal-error: "{prefix}&cAn error occurred with PayPal. Please try again later."
  item-not-found: "{prefix}&cItem not found in configuration."
  category-not-found: "{prefix}&cCategory not found."
  internal-error: "{prefix}&cAn internal error occurred. Please try again."
