# GUI Configuration - Ranks Menu
# ============================================================================
#
# This file controls the appearance and layout of the /ranks GUI
#
# MATERIALS: Use Minecraft material names (e.g., DIAMOND, GOLD_INGOT, etc.)
# COLORS: Use Minecraft color names for glass/wool (WHITE, ORANGE, MAGENTA,
#         LIGHT_BLUE, YELLOW, LIME, PINK, GRAY, LIGHT_GRAY, CYAN, PURPLE,
#         BLUE, BROWN, GREEN, RED, BLACK)
#
# ============================================================================

# GUI Settings
settings:
  # Number of rows (1-6)
  rows: 6

  # Items per page for ranks (recommended: rows * 7 for proper pagination)
  items-per-page: 28

  # Fill empty slots with glass?
  fill-empty: true

  # Play sounds?
  sounds:
    enabled: true
    open: "BLOCK_CHEST_OPEN"
    close: "BLOCK_CHEST_CLOSE"
    click: "UI_BUTTON_CLICK"
    success: "ENTITY_PLAYER_LEVELUP"
    error: "ENTITY_VILLAGER_NO"

# Background/Filler items
filler:
  # Main background glass color
  background:
    material: "GRAY_STAINED_GLASS_PANE"
    name: " "

  # Border glass color (optional, set to same as background to disable)
  border:
    enabled: true
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "

  # Decoration glass for special areas
  decoration:
    material: "LIGHT_BLUE_STAINED_GLASS_PANE"
    name: " "

# Rank item display based on status
rank-items:
  # Completed ranks (already passed)
  completed:
    # Material for completed ranks (can be overridden by rank config)
    default-material: "LIME_STAINED_GLASS"
    # Glow effect (enchanted look)
    glow: false
    # Custom model data (0 to disable)
    custom-model-data: 0
    # Base64 skull texture (leave empty to use material above)
    # When set, all completed rank items become custom player heads
    head-texture: ""

  # Current rank
  current:
    default-material: "GOLD_BLOCK"
    glow: true
    custom-model-data: 0
    head-texture: ""

  # Next available rank
  available:
    default-material: "ORANGE_STAINED_GLASS"
    glow: true
    custom-model-data: 0
    head-texture: ""

  # Locked ranks
  locked:
    default-material: "BLACK_STAINED_GLASS"
    glow: false
    custom-model-data: 0
    head-texture: ""

# Navigation buttons
navigation:
  # Previous page button
  previous-page:
    enabled: true
    slot: 45  # Bottom left
    material: "ARROW"
    custom-model-data: 0

  # Next page button
  next-page:
    enabled: true
    slot: 53  # Bottom right
    material: "ARROW"
    custom-model-data: 0

  # Close button
  close:
    enabled: true
    slot: 49  # Bottom center
    material: "BARRIER"
    custom-model-data: 0

  # Page info indicator
  page-info:
    enabled: true
    slot: 4  # Top center
    material: "BOOK"
    custom-model-data: 0

  # Refresh button
  refresh:
    enabled: true
    slot: 47  # Bottom area
    material: "SUNFLOWER"
    custom-model-data: 0

# Player info panel
player-info:
  enabled: true
  slot: 51  # Bottom right area
  material: "PLAYER_HEAD"
  # Use player's head? (true = player skin, false = material above)
  use-player-head: true
  custom-model-data: 0

# Rank slots configuration
# Define which slots are used for displaying ranks
rank-slots:
  # First row of ranks (slots 10-16 in a 6-row inventory)
  row-1: [10, 11, 12, 13, 14, 15, 16]
  # Second row
  row-2: [19, 20, 21, 22, 23, 24, 25]
  # Third row
  row-3: [28, 29, 30, 31, 32, 33, 34]
  # Fourth row
  row-4: [37, 38, 39, 40, 41, 42, 43]

# Special decorations
decorations:
  # Top decoration row
  top-row:
    enabled: true
    slots: [0, 1, 2, 3, 5, 6, 7, 8]
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "

  # Bottom decoration row
  bottom-row:
    enabled: true
    slots: [45, 46, 48, 50, 52, 53]
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "

  # Side columns
  side-columns:
    enabled: true
    left-slots: [9, 18, 27, 36]
    right-slots: [17, 26, 35, 44]
    material: "GRAY_STAINED_GLASS_PANE"
    name: " "

# Animation settings (Premium only)
animations:
  enabled: false
  # Rainbow glass rotation
  rainbow-border: false
  # Particle effects on hover
  particles: false

# ── LORE TEMPLATES ──
# Customize the lore (tooltip) of rank items in the GUI.
# Each rank status has its own template. Ranks can override with "lore:" in ranks.yml.
#
# SINGLE-LINE PLACEHOLDERS:
#   {rank_display}  - Display name with colors    {rank_id}    - Internal rank ID
#   {prefix}        - Chat prefix                 {cost}       - Formatted cost ($5,000.00)
#   {cost_raw}      - Raw number                  {order}      - Order number
#   {status}        - Status text with color       {balance}    - Player balance
#   {remaining}     - Money still needed           {progress}   - Progress % (64.5)
#   {progress_bar}  - Visual bar [████░░░░]       {player}     - Player name
#   {action}        - Click action hint            {status_color} - Color code (&a/&e/&c)
#
# MULTI-LINE PLACEHOLDERS (expand when alone on line, removed if empty):
#   {description}   - Custom description lines     {requirements} - Requirements with checkmarks
#   {rewards}       - Rewards list
#
lore-templates:
  completed:
    - "&8&m                              "
    - ""
    - "{description}"
    - ""
    - " &a✔ &7Status: {status}"
    - " &7✦ Cost: &6{cost}"
    - ""
    - "&8&m                              "
    - " {action}"

  current:
    - "&8&m                              "
    - ""
    - "{description}"
    - ""
    - " &e◆ &7Status: {status}"
    - " &7✦ Cost: &6{cost}"
    - " &7◈ Order: &f#{order}"
    - ""
    - " &e» &7Progress:"
    - "   {progress_bar} {status_color}{progress}%"
    - ""
    - "{requirements}"
    - "{rewards}"
    - "&8&m                              "
    - " {action}"

  available:
    - "&8&m                              "
    - ""
    - "{description}"
    - ""
    - " &b◆ &7Status: {status}"
    - " &7✦ Cost: &6{cost}"
    - " &7⛃ Balance: &a{balance}"
    - " &7⛁ Needed: &c{remaining}"
    - " &7◈ Order: &f#{order}"
    - ""
    - " &b» &7Progress:"
    - "   {progress_bar} {status_color}{progress}%"
    - ""
    - "{requirements}"
    - "{rewards}"
    - "&8&m                              "
    - " {action}"

  locked:
    - "&8&m                              "
    - ""
    - "{description}"
    - ""
    - " &c◆ &7Status: {status}"
    - " &7✦ Cost: &6{cost}"
    - " &7◈ Order: &f#{order}"
    - ""
    - " &c✗ &7Complete previous ranks first"
    - ""
    - "&8&m                              "
    - " {action}"

# ── CUSTOM ITEMS ──
# Place custom decorative items in any empty GUI slot.
# Use material: "PLAYER_HEAD" with head-texture for custom skull textures.
# head-texture: Base64 encoded texture value (from minecraft-heads.com)
# action: reserved for future use (leave empty)
#
# Example:
#  - slot: 0
#    material: "PLAYER_HEAD"
#    head-texture: "eyJ0ZXh0dXJlcyI6..."
#    name: "&#FFD700✦ Store"
#    lore:
#      - "&7Visit our store!"
#    action: ""
#
custom-items: []
