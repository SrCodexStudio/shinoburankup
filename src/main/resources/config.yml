# ┌──────────────────────────────────────────────────────────────────┐
# │                     PAYPAL CONFIGURATION                         │
# └──────────────────────────────────────────────────────────────────┘
paypal:
  # Your PayPal API credentials
  # Get them at: https://developer.paypal.com/developer/applications
  client-id: ""
  secret: ""

  # PayPal environment: LIVE or SANDBOX
  # *** IMPORTANT: Use SANDBOX for testing! Change to LIVE only when ready for production! ***
  environment: "SANDBOX"

  # PayPal fee configuration (varies by country/volume)
  # Default: US domestic rate (2.9% + $0.30)
  fee:
    percentage: 2.9
    fixed: 0.30

  # Your brand name shown on PayPal checkout
  brand-name: "Your Server"

  # Currency code (USD, EUR, GBP, etc.)
  currency: "USD"

  # Display symbol shown next to prices in-game (e.g., $, EUR, R$, MX$, CLP)
  # This does NOT affect PayPal - only what players see in menus and chat
  currency-symbol: "$"

# ┌──────────────────────────────────────────────────────────────────┐
# │                     TRANSACTION SETTINGS                         │
# └──────────────────────────────────────────────────────────────────┘
transactions:
  # How often to check pending transactions (in seconds)
  check-interval: 300

  # How long before a pending transaction expires (seconds)
  # Default: 3600 = 1 hour
  expire-after: 3600

  # Maximum pending transactions per player
  max-pending-per-player: 1

  # Store transaction history
  store-history: true

  # Days to keep transaction history (0 = forever)
  history-retention-days: 90

# ┌──────────────────────────────────────────────────────────────────┐
# │                     RATE LIMITING                                │
# └──────────────────────────────────────────────────────────────────┘
rate-limit:
  # Enable rate limiting
  enabled: true

  # Maximum requests per player per minute
  max-requests-per-minute: 10

  # Cooldown between store opens (in seconds)
  store-open-cooldown: 3

  # Cooldown between purchase attempts (in seconds)
  purchase-cooldown: 5

  # Temporary ban duration for abuse (in minutes)
  abuse-ban-duration: 15

  # Requests threshold for abuse detection
  abuse-threshold: 50

# ┌──────────────────────────────────────────────────────────────────┐
# │                     MENU SETTINGS                                │
# └──────────────────────────────────────────────────────────────────┘
menu:
  # Category menu settings
  category:
    title: "&b&lShinobu Store"
    rows: 3

  # Enable menu protection (prevent item extraction)
  protection:
    enabled: true
    # Block shift-click
    block-shift-click: true
    # Block number keys
    block-number-keys: true
    # Block drop key
    block-drop: true
    # Block swap with offhand
    block-offhand-swap: true
    # Block dragging
    block-drag: true

  # Confirmation menu before purchase
  confirm-menu:
    enabled: true
    title: "&8Confirm Purchase"

  # Fill empty slots with this item
  filler:
    enabled: true
    material: "GRAY_STAINED_GLASS_PANE"
    name: " "

  # Sound effects
  sounds:
    menu-open: "BLOCK_CHEST_OPEN"
    menu-click: "UI_BUTTON_CLICK"
    purchase-start: "ENTITY_EXPERIENCE_ORB_PICKUP"
    purchase-complete: "ENTITY_PLAYER_LEVELUP"
    error: "ENTITY_VILLAGER_NO"

